# Supabase project config — pins the edge-function JWT posture in version control
# instead of leaving it to the dashboard. `verify_jwt` is the platform-level gate
# Supabase applies BEFORE your code runs.
#
#   verify_jwt = true   -> caller must present a valid Supabase JWT (anon or user).
#                          NOTE: the anon key is public, so this alone is NOT real
#                          authorization — our in-code requireRole/requireStaffOrSecret
#                          checks are what actually protect these functions.
#   verify_jwt = false  -> function is reachable without a Supabase JWT. Required for
#                          third-party webhooks and public/anonymous endpoints. These
#                          MUST verify their own shared secret or gate the caller in
#                          code (we do — see _shared/auth.ts).
#
# This file was synced to the LIVE deployed posture on 2026-07-14 (project
# gdiudffqjhidreqzklbl). All 27 deployed functions are now represented here.
# After changing this file, redeploy the affected functions.

project_id = "gdiudffqjhidreqzklbl"

# --- verify_jwt = false: reachable without a Supabase JWT ---------------------
# Each of these gates the caller itself (webhook secret, or in-code actor check).

[functions.stripe-webhook]
verify_jwt = false            # verifies Stripe signature in code

[functions.vapi-webhook]
verify_jwt = false            # verifies VAPI_WEBHOOK_SECRET in code

[functions.contact-submit]
verify_jwt = false            # public website contact form

[functions.riley-chat]
verify_jwt = false            # public/anonymous-capable; gated in code by identifyActor
                              # (staff = full, signed-in customer = own record, anon = general Q&A)

[functions.riley-summary]
verify_jwt = false            # NOTE: staff-only via requireRole(STAFF_ROLES) in code, but the
                              # platform JWT gate is OFF in live. Relies solely on the in-code
                              # role check. Confirm this is intended (vs. verify_jwt = true).

[functions.riley-call-summary]
verify_jwt = false            # gated in code by requireStaffOrSecret (Vapi callback path)

# --- verify_jwt = true: a valid Supabase JWT is required at the platform edge --
# Sensitive ones additionally enforce a role/secret in code (_shared/auth.ts).

[functions.stripe-checkout]
verify_jwt = true
[functions.get-customer-profile]
verify_jwt = true
